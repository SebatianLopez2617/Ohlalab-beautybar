<!DOCTYPE html>

    <meta charset="UTF-8">

<body>

    <header id="main-header">
        <nav class="navbar">
            <div class="header-logo">
                <a href="index.html">
                       <img src="Fotos/logo2.png" alt="Ohlalab BeautyBar Logo" class="brand-logo">

                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <section class="agenda-container">
            <div id="contenedor-formulario">
                <h1>Agenda tu Cita</h1>
                <p>Completa el formulario para reservar tu espacio de belleza.</p>

                <form id="form-agenda" class="form-grid">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono / WhatsApp:</label>
                        <input type="tel" id="telefono" name="telefono" required>
                    </div>

                    <div class="form-group">
                        <label for="servicio">Servicio:</label>
                        <select id="servicio" name="servicio" required>
                            <option value="">Selecciona uno...</option>
                            <option value="Manicura">Manicura</option>
                            <option value="Pedicura">Pedicura</option>
                            <option value="Limpieza Facial">Limpieza Facial</option>
                            <option value="Pestañas">Pestañas</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fecha">Fecha preferida:</label>
                        <input type="date" id="fecha" name="fecha" required>
                    </div>

                    <div class="form-group">
                        <label for="hora">Hora:</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="comentarios">Notas adicionales:</label>
                        <textarea id="comentarios" name="comentarios" rows="3"></textarea>
                    </div>

                    <button type="submit" id="btn-agendar">Confirmar y Agendar</button>
                </form>
            </div>

            <div id="cita-confirmada" class="content-section" style="display: none;">
                <h2>¡Tienes una cita activa! ✨</h2>
                <div id="datos-reserva" style="margin: 20px 0; text-align: left; background: var(--fucsia-soft); padding: 20px; border-radius: 15px;">
                    </div>
                <button onclick="cancelarCita()" style="background: #666 !important;">Cancelar Cita Actual</button>
            </div>
        </section>
    </main>
